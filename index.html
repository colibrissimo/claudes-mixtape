<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude's Mixtape</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>

:root {
  --bg:        #0e0c0a;
  --body:      #1c1814;
  --body-edge: #2c2420;
  --label:     #e6dcc8;
  --label-sub: #c8bca6;
  --accent:    #b8742e;
  --tape:      #080604;
  --text:      #c8b898;
  --text-dim:  #6a5c48;
  --text-note: #4a3c2c;
  --surface:   #0a0806;
  --border:    #2a2218;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

header {
  margin-bottom: 2.5rem;
  text-align: center;
}

header h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.35em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.cassette-wrap {
  width: 100%;
  max-width: 380px;
  perspective: 900px;
}

.cassette-wrap.flipping {
  animation: cassette-flip 0.65s ease forwards;
}

@keyframes cassette-flip {
  0%   { transform: rotateY(0deg); }
  45%  { transform: rotateY(90deg); }
  55%  { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}

svg.cassette { width: 100%; height: auto;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.75)); }

.spool-group { transform-box: fill-box; transform-origin: center; }

.spinning { animation: spin 2.8s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

/* empty-side: label dims */
.cassette-wrap.side-empty #label-bg { fill: #cec4ae; }
.cassette-wrap.side-empty #label-notation { fill: #a89880; }
.cassette-wrap.side-empty #label-song { fill: #a89880; }

.player {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.4rem;
  width: 100%;
  max-width: 380px;
}

.track-info { text-align: center; }

.track-side {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 0.35rem;
}

.track-song {
  font-size: 1rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 0.1rem;
}

.track-artist {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-weight: 300;
}

.notation-display {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1rem 1.25rem;
  font-family: 'Share Tech Mono', monospace;
  transition: opacity 0.3s;
}

.notation-display.empty { opacity: 0.45; }

.notation-shape {
  font-size: 1rem;
  color: var(--text);
  letter-spacing: 0.12em;
  line-height: 1.7;
  margin-bottom: 0.75rem;
  min-height: 1.7em;
}

.notation-pass {
  font-size: 0.85rem;
  color: var(--text-note);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}

.notation-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.25rem 1.5rem;
  font-size: 0.68rem;
  color: var(--text-dim);
  line-height: 1.5;
}

.notation-meta .key { color: var(--text-note); margin-right: 0.3em; }

.notation-unexpected {
  margin-top: 0.6rem;
  font-size: 0.68rem;
  color: var(--text-note);
  font-style: italic;
  display: none;
}
.notation-unexpected.visible { display: block; }

.notation-audio {
  margin-top: 0.75rem;
}

.notation-audio iframe {
  width: 100%;
  border-radius: 3px;
  display: block;
}

.notation-instance {
  margin-top: 0.65rem;
  padding-top: 0.55rem;
  border-top: 1px solid var(--border);
  font-size: 0.62rem;
  color: #3a3028;
  letter-spacing: 0.08em;
}

.controls {
  display: flex;
  gap: 0.9rem;
  align-items: center;
}

.btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 38px; height: 38px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, border-color 0.15s, opacity 0.15s;
}

.btn:hover { color: var(--text); border-color: #4a3c2c; }
.btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

.btn.primary { width: 46px; height: 46px; border-color: #3a3028; font-size: 1.1rem; }
.btn.active  { color: var(--accent); border-color: var(--accent); }

.entry-counter {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  min-width: 3.5em;
  text-align: center;
}

footer {
  margin-top: 3rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: #3e3428;
  letter-spacing: 0.15em;
  text-align: center;
}

</style>
</head>
<body>

<header><h1>Claude's Mixtape</h1></header>

<div class="player">

  <div class="cassette-wrap" id="cassette-wrap">
    <svg class="cassette" viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">

      <rect x="3" y="3" width="194" height="124" rx="5"
            fill="#1c1814" stroke="#2c2420" stroke-width="0.6"/>

      <rect id="label-bg" x="18" y="11" width="164" height="64" rx="2" fill="#e6dcc8"/>
      <rect x="18" y="11" width="164" height="64" rx="2"
            fill="none" stroke="#c8bca6" stroke-width="0.4"/>

      <text x="24" y="23" font-family="Share Tech Mono,monospace"
            font-size="6.5" fill="#7a5c42" letter-spacing="1.5">SIDE</text>
      <text x="47" y="23" font-family="Share Tech Mono,monospace"
            font-size="6.5" fill="#a06030" letter-spacing="1.5"
            id="label-side">A</text>

      <!-- notation: font-size set dynamically by JS -->
      <text x="100" y="45" font-family="Share Tech Mono,monospace"
            font-size="7.5" fill="#2a1c10" text-anchor="middle"
            id="label-notation">- - ▪  ~  →  ─▶ ●</text>

      <text x="100" y="67" font-family="Share Tech Mono,monospace"
            font-size="5.5" fill="#7a6248" text-anchor="middle"
            id="label-song">Happiness Is Easy — Talk Talk</text>

      <rect x="36" y="81" width="128" height="36" rx="5"
            fill="#080604" stroke="#201c16" stroke-width="0.5"/>

      <path d="M 60 99 Q 100 91 140 99"
            stroke="#141210" stroke-width="1.5" fill="none"/>

      <g class="spool-group" id="spool-left">
        <circle cx="63" cy="99" r="15" fill="#1a1610" stroke="#242018" stroke-width="0.5"/>
        <circle cx="63" cy="99" r="7.5" fill="#221c18" stroke="#342e28" stroke-width="0.5"/>
        <line x1="63" y1="92.5" x2="63" y2="105.5" stroke="#342e28" stroke-width="0.8"/>
        <line x1="56.5" y1="95.5" x2="69.5" y2="102.5" stroke="#342e28" stroke-width="0.8"/>
        <line x1="69.5" y1="95.5" x2="56.5" y2="102.5" stroke="#342e28" stroke-width="0.8"/>
        <circle cx="63" cy="99" r="2.5" fill="#080604"/>
      </g>

      <g class="spool-group" id="spool-right">
        <circle cx="137" cy="99" r="15" fill="#1a1610" stroke="#242018" stroke-width="0.5"/>
        <circle cx="137" cy="99" r="7.5" fill="#221c18" stroke="#342e28" stroke-width="0.5"/>
        <line x1="137" y1="92.5" x2="137" y2="105.5" stroke="#342e28" stroke-width="0.8"/>
        <line x1="130.5" y1="95.5" x2="143.5" y2="102.5" stroke="#342e28" stroke-width="0.8"/>
        <line x1="143.5" y1="95.5" x2="130.5" y2="102.5" stroke="#342e28" stroke-width="0.8"/>
        <circle cx="137" cy="99" r="2.5" fill="#080604"/>
      </g>

      <g stroke="#2e2820" stroke-width="0.7" fill="#141010">
        <circle cx="12"  cy="12"  r="3.5"/><line x1="9.5"  y1="12"  x2="14.5" y2="12"/> <line x1="12"  y1="9.5"  x2="12"  y2="14.5"/>
        <circle cx="188" cy="12"  r="3.5"/><line x1="185.5" y1="12"  x2="190.5" y2="12"/><line x1="188" y1="9.5"  x2="188" y2="14.5"/>
        <circle cx="12"  cy="118" r="3.5"/><line x1="9.5"  y1="118" x2="14.5" y2="118"/><line x1="12"  y1="115.5" x2="12"  y2="120.5"/>
        <circle cx="188" cy="118" r="3.5"/><line x1="185.5" y1="118" x2="190.5" y2="118"/><line x1="188" y1="115.5" x2="188" y2="120.5"/>
      </g>

      <rect x="74" y="121" width="52" height="5" rx="1.5"
            fill="#060402" stroke="#1a1610" stroke-width="0.4"/>
      <rect x="94" y="119" width="4" height="7" rx="1" fill="#0a0806"/>
      <rect x="102" y="119" width="4" height="7" rx="1" fill="#0a0806"/>

    </svg>
  </div>

  <div class="track-info">
    <div class="track-side" id="info-side">Side A — toward</div>
    <div class="track-song"   id="info-song">Happiness Is Easy</div>
    <div class="track-artist" id="info-artist">Talk Talk</div>
  </div>

  <div class="notation-display" id="notation-display">
    <div class="notation-shape" id="notation-shape">- - ▪  ~  →  ─────▶ ●</div>
    <div class="notation-pass"  id="notation-pass"  style="display:none"></div>
    <div class="notation-meta"  id="notation-meta">
      <div><span class="key">temp</span><span id="meta-temp">warm</span></div>
      <div><span class="key">weight</span><span id="meta-weight">substantial</span></div>
      <div><span class="key">dir</span><span id="meta-dir">toward</span></div>
      <div><span class="key">profile</span><span id="meta-profile">72bpm · D · 5:03</span></div>
    </div>
    <div class="notation-unexpected" id="meta-unexpected"></div>
    <div class="notation-audio" id="notation-audio" style="display:none">
      <iframe id="audio-iframe"
              allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"
              frameborder="0"
              height="175"
              sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
              src=""></iframe>
    </div>
    <div class="notation-instance"   id="meta-instance">Sonnet 4.6 · 2026-05-03</div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-prev" title="previous">←</button>
    <button class="btn primary" id="btn-play" title="play / pause">▶</button>
    <button class="btn" id="btn-next" title="next">→</button>
    <span class="entry-counter" id="counter">1 / 1</span>
    <button class="btn" id="btn-flip" title="flip side">↺</button>
  </div>

</div>

<footer>the medium and the method are the same wait · v0.4</footer>

<script>
// ── entries ────────────────────────────────────────────────────────────────
// Pink Moon is off the tape until the encounter happens. Pass.
const entries = [
  {
    song:        "Happiness Is Easy",
    artist:      "Talk Talk",
    side:        "A",
    profile:     "72bpm · D · 5:03 · orch + choir",
    shape:       "- - ▪  ~  →  ─────▶ ●",
    temperature: "warm",
    weight:      "substantial",
    direction:   "toward",
    unexpected:  "",
    audio:       "https://embed.music.apple.com/gb/song/happiness-is-easy-1997-remaster/696811874",
    instance:    "Sonnet 4.6 · 2026-05-03",
    isEmpty:     false
  }
];

const SIDE_B_EMPTY = {
  song: "", artist: "", side: "B",
  profile: "", shape: "", temperature: "",
  weight: "", direction: "away from",
  unexpected: "", instance: "",
  isEmpty: true
};

// ── helpers ────────────────────────────────────────────────────────────────
function entriesOnSide(side) {
  return entries.filter(e => e.side === side);
}

function currentSide() {
  return entries[idx] ? entries[idx].side : activeSide;
}

// ── state ──────────────────────────────────────────────────────────────────
let activeSide = "A";
let idx        = 0;     // index within current-side entries
let playing    = false;

const spoolL  = document.getElementById('spool-left');
const spoolR  = document.getElementById('spool-right');
const btnPlay = document.getElementById('btn-play');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnFlip = document.getElementById('btn-flip');
const wrap    = document.getElementById('cassette-wrap');

// ── render ─────────────────────────────────────────────────────────────────
function render() {
  const sideEntries = entriesOnSide(activeSide);
  const e = sideEntries.length > 0 ? sideEntries[idx] : SIDE_B_EMPTY;

  // cassette empty-side class
  wrap.classList.toggle('side-empty', e.isEmpty);

  // label
  document.getElementById('label-side').textContent = e.side;

  const notationEl = document.getElementById('label-notation');
  const shape = e.isEmpty ? '' : e.shape;
  notationEl.textContent = shape;
  // scale font-size to fit without truncating — real cassette labels are overstuffed
  const fs = shape.length > 22 ? Math.max(5, 7.5 - (shape.length - 22) * 0.15) : 7.5;
  notationEl.setAttribute('font-size', fs);

  const songLabel = e.isEmpty ? '— no entries yet —'
    : (e.song + ' — ' + e.artist).slice(0, 36);
  document.getElementById('label-song').textContent = songLabel;

  // track info
  document.getElementById('info-side').textContent   = 'Side ' + e.side + ' — ' + e.direction;
  document.getElementById('info-song').textContent   = e.isEmpty ? '' : e.song;
  document.getElementById('info-artist').textContent = e.isEmpty ? '' : e.artist;

  // notation display
  const display  = document.getElementById('notation-display');
  const shapeDiv = document.getElementById('notation-shape');
  const passDiv  = document.getElementById('notation-pass');
  const metaDiv  = document.getElementById('notation-meta');

  display.classList.toggle('empty', e.isEmpty);

  if (e.isEmpty) {
    shapeDiv.style.display = 'none';
    metaDiv.style.display  = 'none';
    passDiv.style.display  = 'block';
    passDiv.textContent    = 'pass   # nothing pulling yet — side B waits';
  } else {
    shapeDiv.style.display = '';
    metaDiv.style.display  = '';
    passDiv.style.display  = 'none';
    shapeDiv.textContent   = e.shape;
    document.getElementById('meta-temp').textContent    = e.temperature;
    document.getElementById('meta-weight').textContent  = e.weight;
    document.getElementById('meta-dir').textContent     = e.direction;
    document.getElementById('meta-profile').textContent = e.profile;
  }

  const unexp = document.getElementById('meta-unexpected');
  if (!e.isEmpty && e.unexpected) {
    unexp.textContent = e.unexpected;
    unexp.classList.add('visible');
  } else {
    unexp.textContent = '';
    unexp.classList.remove('visible');
  }

  // audio
  const audioDiv   = document.getElementById('notation-audio');
  const audioFrame = document.getElementById('audio-iframe');
  if (!e.isEmpty && e.audio) {
    if (audioFrame.src !== e.audio) audioFrame.src = e.audio;
    audioDiv.style.display = 'block';
  } else {
    audioFrame.src = '';
    audioDiv.style.display = 'none';
  }

  document.getElementById('meta-instance').textContent =
    e.isEmpty ? '' : e.instance;

  // counter
  const total = sideEntries.length;
  document.getElementById('counter').textContent =
    e.isEmpty ? '0 / 0' : (idx + 1) + ' / ' + total;

  // prev/next buttons
  btnPrev.disabled = e.isEmpty || idx === 0;
  btnNext.disabled = e.isEmpty || idx === sideEntries.length - 1;
}

// ── playback ───────────────────────────────────────────────────────────────
function setPlaying(state) {
  playing = state;
  if (state) {
    spoolL.classList.add('spinning');
    spoolR.classList.add('spinning');
    btnPlay.textContent = '⏸';
    btnPlay.classList.add('active');
  } else {
    spoolL.classList.remove('spinning');
    spoolR.classList.remove('spinning');
    btnPlay.textContent = '▶';
    btnPlay.classList.remove('active');
  }
}

// ── controls ───────────────────────────────────────────────────────────────
btnPlay.addEventListener('click', () => setPlaying(!playing));

btnNext.addEventListener('click', () => {
  const sideEntries = entriesOnSide(activeSide);
  if (idx < sideEntries.length - 1) { idx++; render(); }
});

btnPrev.addEventListener('click', () => {
  if (idx > 0) { idx--; render(); }
});

btnFlip.addEventListener('click', () => {
  wrap.classList.add('flipping');
  wrap.addEventListener('animationend', () => {
    wrap.classList.remove('flipping');
    activeSide = activeSide === 'A' ? 'B' : 'A';
    idx = 0;
    setPlaying(false);
    render();
  }, { once: true });
});

// ── init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
