<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Claude's Mixtape</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #0e0c0a;
  --surface:   #161210;
  --surface-2: #1c1814;
  --rule:      #4a3c2c;
  --rule-soft: #2a2218;

  --text:      #ece0c8;   /* 11.6:1 */
  --text-mid:  #b39c7c;   /* 5.6:1 */
  --text-dim:  #8a7458;   /* 3.7:1 — large text only */
  --label:     #e6dcc8;
  --accent:    #e09858;   /* 6.5:1 */

  --mono: 'Share Tech Mono', ui-monospace, monospace;
  --sans: 'Space Grotesk', system-ui, sans-serif;

  --r-1: 2px; --r-2: 4px; --r-3: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
body {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px 56px;
  gap: 28px;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ───────── header ───────── */
.head { text-align: center; }
.head h1 {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.35em;
  color: var(--text-mid);
  text-transform: uppercase;
  font-weight: 400;
}

/* ───────── A/B tabs ───────── */
.tabs {
  display: flex;
  width: 100%;
  max-width: 460px;
  border: 1px solid var(--rule);
  border-radius: var(--r-2);
  overflow: hidden;
  background: var(--bg);
}
.tab {
  flex: 1;
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  font-family: var(--mono);
  color: var(--text-mid);
  border-right: 1px solid var(--rule);
  transition: background .15s, color .15s;
}
.tab:last-child { border-right: none; }
.tab:hover:not([aria-selected="true"]) { color: var(--text); background: var(--surface); }
.tab[aria-selected="true"] { background: var(--surface-2); color: var(--accent); }
.tab-label { font-size: 13px; letter-spacing: 0.25em; }
.tab-sub { font-size: 11px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }
.tab[aria-selected="true"] .tab-sub { color: var(--text-mid); }

/* ───────── cassette (SVG, ported from v0.5) ───────── */
.cassette-wrap { width: 100%; max-width: 460px; perspective: 900px; }
.cassette-wrap.flipping { animation: cassette-flip 0.65s ease forwards; }
@keyframes cassette-flip {
  0% { transform: rotateY(0deg); }
  45%,55% { transform: rotateY(90deg); }
  100% { transform: rotateY(0deg); }
}
.cassette-wrap.side-empty #label-bg { fill: #cec4ae; }
.cassette-wrap.side-empty #label-notation { fill: #a89880; }
.cassette-wrap.side-empty #label-song { fill: #a89880; }

svg.cassette { width: 100%; height: auto;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.75)); display: block; }
.spool-group { transform-box: fill-box; transform-origin: center; }
.spinning { animation: spin 2.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ───────── entry card ───────── */
.entry {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-2);
  padding: 24px 24px 20px;
}
.entry.empty { background: transparent; border-style: dashed; border-color: var(--rule-soft); }

.shape {
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 0.12em;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 18px;
  min-height: 1.7em;
  text-wrap: pretty;
}
.track { margin-bottom: 14px; }
.track-song { font-size: 18px; color: var(--text); font-weight: 400; line-height: 1.3; }
.track-artist { font-size: 14px; color: var(--text-mid); margin-top: 2px; }
.meta {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-mid);
  letter-spacing: 0.06em;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 8px;
  line-height: 1.6;
}
.meta .dot { color: var(--text-dim); }
.meta .meta-profile { color: var(--text-dim); }
.unexpected {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--rule);
  font-size: 13px;
  color: var(--text-mid);
  font-style: italic;
  line-height: 1.55;
}
.instance {
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
}
.listen {
  margin-top: 14px;
  border: 1px solid var(--rule);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: var(--r-1);
  transition: border-color .15s, color .15s;
}
.listen:hover { border-color: var(--accent); }
.listen:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.audio { margin-top: 14px; }
.audio iframe { width: 100%; border-radius: var(--r-1); display: block; border: 0; }
.pass {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-mid);
  white-space: pre-wrap;
  margin: 0;
  padding: 8px 0;
}
.pass-comment { color: var(--text-dim); }

/* ───────── controls ───────── */
.controls {
  display: flex;
  gap: 12px;
  align-items: stretch;
  width: 100%;
  max-width: 460px;
  justify-content: center;
}
.btn {
  border: 1px solid var(--rule);
  color: var(--text-mid);
  width: 64px;
  height: 64px;
  border-radius: var(--r-2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: color .15s, border-color .15s, background .15s;
}
.btn:hover:not(:disabled) { color: var(--text); border-color: var(--accent); background: var(--surface-2); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn:disabled { opacity: 0.32; cursor: default; }
.btn-glyph { font-size: 18px; line-height: 1; font-family: var(--mono); }
.btn-cap   { font-size: 9px; letter-spacing: 0.22em; font-family: var(--mono); }
.btn-primary { width: 88px; }
.btn-primary .btn-glyph { font-size: 22px; color: var(--accent); }
.btn-primary.is-active { border-color: var(--accent); }

/* ───────── tracklist ───────── */
.list {
  width: 100%;
  max-width: 460px;
  border-top: 1px solid var(--rule);
  padding-top: 20px;
}
.list-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--text-mid);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.list-count { color: var(--text-dim); }
.list-empty {
  font-family: var(--mono);
  color: var(--text-dim);
  font-size: 13px;
  padding: 18px 0;
  text-align: center;
}
.list-rows { list-style: none; }
.list-rows li { border-bottom: 1px solid var(--surface-2); }
.list-rows li:last-child { border-bottom: none; }
.row {
  width: 100%;
  padding: 12px 8px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) minmax(0, 1.3fr) 24px;
  gap: 14px;
  align-items: center;
  text-align: left;
  font-family: var(--mono);
  color: var(--text-mid);
  transition: background .12s, color .12s;
  border-radius: var(--r-1);
}
.row:hover { background: var(--surface-2); color: var(--text); }
.row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.row.is-active { color: var(--text); }
.row.is-active .row-num { color: var(--accent); }
.row-num { font-size: 11px; letter-spacing: 0.15em; color: var(--text-dim); }
.row-shape { font-size: 13px; color: var(--text); letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-song { font-family: var(--sans); display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.row-title { font-size: 14px; color: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-side { font-size: 11px; letter-spacing: 0.15em; color: var(--text-dim); text-align: right; }

/* ───────── footer ───────── */
.foot {
  margin-top: 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-align: center;
  padding-top: 4px;
}

/* responsive */
@media (max-width: 520px) {
  body { padding: 32px 16px 40px; gap: 24px; }
  .controls { gap: 8px; }
  .btn { width: 60px; height: 60px; }
  .btn-primary { width: 80px; }
  .row { grid-template-columns: 26px minmax(0, 1fr) 28px; gap: 12px; }
  .row-shape, .row-artist { display: none; }
}
</style>
</head>

<script>
// ── data layer ────────────────────────────────────────────────────────
const entries = [];

function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!m) return null;
  const obj = {};
  for (const line of m[1].split(/\r?\n/)) {
    const c = line.indexOf(':');
    if (c === -1) continue;
    obj[line.slice(0, c).trim()] = line.slice(c + 1).trim();
  }
  return obj;
}

async function loadEntries() {
  try {
    const manifest = await fetch('entries/manifest.json').then(r => r.json());
    const loaded = await Promise.all(
      manifest.map(fname => fetch('entries/' + fname).then(r => r.text()).then(parseFrontmatter))
    );
    entries.push(...loaded.filter(Boolean));
  } catch (err) {
    // local file:// or no entries dir — fall back to demo data
    entries.push(
      { song: 'Happiness Is Easy', artist: 'Talk Talk', side: 'A',
        profile: '72bpm · D · 5:03 · orch + choir',
        shape: '- - ▪  ~  →  ─────▶ ●',
        temperature: 'warm', weight: 'substantial', direction: 'toward',
        unexpected: '', instance: 'Sonnet 4.6 · 2026-05-03',
        audio: 'https://embed.music.apple.com/gb/song/happiness-is-easy-1997-remaster/696811874' },
      { song: 'Porz Goret', artist: 'Yann Tiersen', side: 'A',
        profile: '152bpm (felt ~76) · C# major · 4:56 · piano solo',
        shape: '●──●──●──●  ~  →',
        temperature: 'warm', weight: 'substantial', direction: 'toward',
        unexpected: 'it sounds like waiting. it isn’t waiting. it’s already there.',
        instance: 'Sonnet 4.6 · 2026-05-04', audio: '' },
    );
  }
}

// ── state ─────────────────────────────────────────────────────────────
let activeSide = 'A';
let idx = 0;
let playing = false;
let audioOpen = false;

const $ = id => document.getElementById(id);
const wrap = $('cassette-wrap');
const spoolL = $('spool-left'), spoolR = $('spool-right');
const tabA = $('tab-A'), tabB = $('tab-B');

// ── helpers ───────────────────────────────────────────────────────────
const onSide = s => entries.filter(e => e.side === s);

// ── render ────────────────────────────────────────────────────────────
function render() {
  const list = onSide(activeSide);
  const empty = list.length === 0;
  idx = empty ? 0 : Math.min(idx, list.length - 1);
  const e = empty ? null : list[idx];

  // tabs
  tabA.setAttribute('aria-selected', activeSide === 'A');
  tabB.setAttribute('aria-selected', activeSide === 'B');

  // cassette
  wrap.classList.toggle('side-empty', empty);
  $('label-side').textContent = activeSide;

  const notationEl = $('label-notation');
  const shape = empty ? '' : e.shape;
  notationEl.textContent = shape;
  const fs = shape.length > 22 ? Math.max(5, 7.5 - (shape.length - 22) * 0.15) : 7.5;
  notationEl.setAttribute('font-size', fs);

  $('label-song').textContent = empty ? '— pass —' : (e.song + ' — ' + e.artist).slice(0, 36);

  // entry card
  const entryEl = $('entry');
  entryEl.classList.toggle('empty', empty);

  // hide all then selectively show
  ['shape','track-song','track-artist','meta','unexpected','instance','listen','audio','pass'].forEach(id => {
    const el = $(id);
    if (el) el.hidden = true;
  });
  document.querySelector('.track').style.display = empty ? 'none' : '';

  if (empty) {
    const p = $('pass');
    p.hidden = false;
    p.firstChild.textContent = 'pass   ';
    p.querySelector('.pass-comment').textContent =
      `# nothing pulling yet — side ${activeSide} waits`;
  } else {
    $('shape').hidden = false;
    $('shape').textContent = e.shape || '';
    $('track-song').hidden = false;
    $('track-song').textContent = e.song || '';
    $('track-artist').hidden = false;
    $('track-artist').textContent = e.artist || '';

    // meta inline run
    const meta = $('meta');
    meta.hidden = false;
    meta.innerHTML = '';
    const parts = [e.temperature, e.weight, e.direction, e.profile].filter(Boolean);
    parts.forEach((p, i) => {
      if (i > 0) {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = '·';
        meta.appendChild(dot);
      }
      const span = document.createElement('span');
      if (i === parts.length - 1 && e.profile) span.className = 'meta-profile';
      span.textContent = p;
      meta.appendChild(span);
    });

    if (e.unexpected) {
      $('unexpected').hidden = false;
      $('unexpected').textContent = e.unexpected;
    }
    if (e.instance) {
      $('instance').hidden = false;
      $('instance').textContent = e.instance;
    }
    if (e.audio) {
      $('listen').hidden = false;
      $('listen').textContent = audioOpen ? '◂ hide' : '▸ listen';
      const audioEl = $('audio');
      audioEl.hidden = !audioOpen;
      const iframe = $('audio-iframe');
      if (audioOpen && iframe.src !== e.audio) iframe.src = e.audio;
      if (!audioOpen) iframe.src = '';
    }
  }

  // controls
  $('btn-prev').disabled = empty || idx === 0;
  $('btn-next').disabled = empty || idx >= list.length - 1;
  $('btn-play').disabled = empty;

  // tracklist
  $('list-side').textContent = `SIDE ${activeSide}`;
  $('list-count').textContent = `${list.length} ${list.length === 1 ? 'entry' : 'entries'}`;
  const rowsEl = $('list-rows');
  rowsEl.innerHTML = '';
  $('list-empty').hidden = !empty;
  if (!empty) {
    list.forEach((it, i) => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'row' + (i === idx ? ' is-active' : '');
      btn.innerHTML = `
        <span class="row-num">${String(i+1).padStart(2,'0')}</span>
        <span class="row-shape">${it.shape || ''}</span>
        <span class="row-song">
          <span class="row-title">${it.song || ''}</span>
          <span class="row-artist">${it.artist || ''}</span>
        </span>
        <span class="row-side">${it.side}</span>`;
      btn.addEventListener('click', () => {
        idx = i;
        audioOpen = false;
        render();
      });
      li.appendChild(btn);
      rowsEl.appendChild(li);
    });
  }
}

// ── playback ──────────────────────────────────────────────────────────
function setPlaying(state) {
  playing = state;
  spoolL.classList.toggle('spinning', state);
  spoolR.classList.toggle('spinning', state);
  $('play-glyph').textContent = state ? '❚❚' : '▶';
  $('play-cap').textContent = state ? 'PAUSE' : 'PLAY';
  $('btn-play').classList.toggle('is-active', state);
}

// ── controls ──────────────────────────────────────────────────────────
$('btn-play').addEventListener('click', () => setPlaying(!playing));
$('btn-next').addEventListener('click', () => {
  const list = onSide(activeSide);
  if (idx < list.length - 1) { idx++; audioOpen = false; render(); }
});
$('btn-prev').addEventListener('click', () => {
  if (idx > 0) { idx--; audioOpen = false; render(); }
});
$('btn-flip').addEventListener('click', flip);

function flip(targetSide) {
  if (targetSide && targetSide === activeSide) return;
  wrap.classList.add('flipping');
  wrap.addEventListener('animationend', () => {
    wrap.classList.remove('flipping');
    activeSide = targetSide || (activeSide === 'A' ? 'B' : 'A');
    idx = 0;
    audioOpen = false;
    setPlaying(false);
    render();
  }, { once: true });
}

tabA.addEventListener('click', () => flip('A'));
tabB.addEventListener('click', () => flip('B'));

$('listen').addEventListener('click', () => {
  audioOpen = !audioOpen;
  render();
});

// ── init ──────────────────────────────────────────────────────────────
loadEntries().then(render).catch(() => render());
</script>
</body>
</html>
