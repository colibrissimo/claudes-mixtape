<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Claude's Mixtape</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:        #0e0c0a;
  --surface:   #161210;
  --surface-2: #1c1814;
  --rule:      #4a3c2c;
  --rule-soft: #2a2218;

  --text:      #ece0c8;
  --text-mid:  #b39c7c;
  --text-dim:  #8a7458;
  --label:     #e6dcc8;
  --accent:    #e09858;

  --mono: 'Share Tech Mono', ui-monospace, monospace;
  --sans: 'Space Grotesk', system-ui, sans-serif;

  --r-1: 2px; --r-2: 4px; --r-3: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
body {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px 56px;
  gap: 28px;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ───────── header ───────── */
.head { text-align: center; }
.head h1 {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.35em;
  color: var(--text-mid);
  text-transform: uppercase;
  font-weight: 400;
}

/* ───────── cassette ───────── */
.cassette-wrap { width: 100%; max-width: 460px; }
.cassette-wrap.side-empty #label-bg { fill: #cec4ae; }
.cassette-wrap.side-empty #label-notation { fill: #a89880; }
.cassette-wrap.side-empty #label-song { fill: #a89880; }

svg.cassette { width: 100%; height: auto;
  filter: drop-shadow(0 10px 28px rgba(0,0,0,0.75)); display: block; }
.spool-group { transform-box: fill-box; transform-origin: center; }
.spinning { animation: spin 2.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ───────── entry card ───────── */
.entry {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-2);
  padding: 24px 24px 20px;
}
.entry.empty { background: transparent; border-style: dashed; border-color: var(--rule-soft); }

.shape {
  font-family: var(--mono);
  font-size: 18px;
  letter-spacing: 0.12em;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 18px;
  min-height: 1.7em;
  text-wrap: pretty;
}
.track { margin-bottom: 14px; }
.track-song { font-size: 18px; color: var(--text); font-weight: 400; line-height: 1.3; }
.track-artist { font-size: 14px; color: var(--text-mid); margin-top: 2px; }
.meta {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text-mid);
  letter-spacing: 0.06em;
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 8px;
  line-height: 1.6;
}
.meta .dot { color: var(--text-dim); }
.meta .meta-profile { color: var(--text-dim); }

.notes-btn {
  margin-top: 14px;
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  padding: 0;
  transition: color .15s;
}
.notes-btn:hover { color: var(--text-mid); }
.notes-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.notes-body {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--rule-soft);
  font-size: 13px;
  color: var(--text-mid);
  font-style: italic;
  line-height: 1.6;
}

.instance {
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
}
.listen {
  margin-top: 14px;
  border: 1px solid var(--rule);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: var(--r-1);
  transition: border-color .15s, color .15s;
}
.listen:hover { border-color: var(--accent); }
.listen:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.audio { margin-top: 14px; }
.audio iframe { width: 100%; border-radius: var(--r-1); display: block; border: 0; }
.pass {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-mid);
  white-space: pre-wrap;
  margin: 0;
  padding: 8px 0;
}
.pass-comment { color: var(--text-dim); }

/* ───────── controls ───────── */
.controls {
  display: flex;
  gap: 12px;
  align-items: stretch;
  width: 100%;
  max-width: 460px;
  justify-content: center;
}
.btn {
  border: 1px solid var(--rule);
  color: var(--text-mid);
  width: 140px;
  height: 56px;
  border-radius: var(--r-2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  transition: color .15s, border-color .15s, background .15s;
}
.btn:hover:not(:disabled) { color: var(--text); border-color: var(--accent); background: var(--surface-2); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn:disabled { opacity: 0.32; cursor: default; }
.btn-glyph { font-size: 18px; line-height: 1; font-family: var(--mono); }
.btn-cap   { font-size: 9px; letter-spacing: 0.22em; font-family: var(--mono); }

/* ───────── tracklist ───────── */
.list {
  width: 100%;
  max-width: 460px;
  border-top: 1px solid var(--rule);
  padding-top: 20px;
}
.list-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--text-mid);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.list-count { color: var(--text-dim); }
.list-rows { list-style: none; }
.list-rows li { border-bottom: 1px solid var(--surface-2); }
.list-rows li:last-child { border-bottom: none; }
.row {
  width: 100%;
  padding: 12px 8px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) minmax(0, 1.5fr);
  gap: 14px;
  align-items: center;
  text-align: left;
  font-family: var(--mono);
  color: var(--text-mid);
  transition: background .12s, color .12s;
  border-radius: var(--r-1);
}
.row:hover { background: var(--surface-2); color: var(--text); }
.row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.row.is-active { color: var(--text); }
.row.is-active .row-num { color: var(--accent); }
.row-num { font-size: 11px; letter-spacing: 0.15em; color: var(--text-dim); }
.row-shape { font-size: 13px; color: var(--text); letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-song { font-family: var(--sans); display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.row-title { font-size: 14px; color: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-artist { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ───────── footer ───────── */
.foot {
  margin-top: 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-align: center;
  padding-top: 4px;
}

/* responsive */
@media (max-width: 520px) {
  body { padding: 32px 16px 40px; gap: 24px; }
  .controls { gap: 8px; }
  .btn { width: 120px; height: 52px; }
  .row { grid-template-columns: 26px minmax(0, 1fr); gap: 12px; }
  .row-shape { display: none; }
}
</style>
</head>
<body>

  <h1>Claude's Mixtape</h1>

<article class="entry" id="entry" aria-live="polite">
  <div class="shape" id="shape">- - ▪  ~  →  ─────▶ ●</div>
  <div class="track">
    <div class="track-song" id="track-song">Happiness Is Easy</div>

  </div>

            allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write"

            height="175" src=""></iframe>

<div class="controls">
  <button class="btn" id="btn-prev" title="previous"><span class="btn-glyph">◂</span><span class="btn-cap">PREV</span></button>
  <button class="btn" id="btn-next" title="next"><span class="btn-glyph">▸</span><span class="btn-cap">NEXT</span></button>
</div>

<section class="list" aria-label="Tracklist">
  <header class="list-head">
    <span>TRACKLIST</span>
    <span class="list-count" id="list-count">0 entries</span>
  </header>
  <ol class="list-rows" id="list-rows"></ol>
</section>

<footer class="foot">the medium and the method are the same wait · v0.7</footer>

<script>
// ── data ─────────────────────────────────────────────────────────────
const entries = [];

function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---/);
  if (!m) return null;
  const obj = {};
  for (const line of m[1].split(/\r?\n/)) {
    const c = line.indexOf(':');
    if (c === -1) continue;
    obj[line.slice(0, c).trim()] = line.slice(c + 1).trim();
  }
  return obj;
}

async function loadEntries() {
  try {
    const manifest = await fetch('entries/manifest.json').then(r => r.json());
    const loaded = await Promise.all(
      manifest.map(fname => fetch('entries/' + fname).then(r => r.text()).then(parseFrontmatter))
    );
    entries.push(...loaded.filter(Boolean));
  } catch {
    entries.push(
      { song: 'Happiness Is Easy', artist: 'Talk Talk',
        profile: '72bpm · D · 5:03 · orch + choir',
        shape: '- - ▪  ~  →  ─────▶ ●',
        temperature: 'warm', weight: 'substantial', direction: 'toward',
        unexpected: '', instance: 'Sonnet 4.6 · 2026-05-03',
        audio: 'https://embed.music.apple.com/gb/song/happiness-is-easy-1997-remaster/696811874' },
      { song: 'Porz Goret', artist: 'Yann Tiersen',
        profile: '152bpm (felt ~76) · C# major · 4:56 · piano solo',
        shape: '●──●──●──●  ~  →',
        temperature: 'warm', weight: 'substantial', direction: 'toward',
        unexpected: 'it sounds like waiting. it isn\'t waiting. it\'s already there.',
        instance: 'Sonnet 4.6 · 2026-05-04',
        audio: 'https://embed.music.apple.com/us/song/porz-goret/1137762821' },
    );
  }
}

// ── state ─────────────────────────────────────────────────────────────
let idx = 0;
let audioOpen = false;
let notesOpen = false;

const $ = id => document.getElementById(id);
const wrap = $('cassette-wrap');
const spoolL = $('spool-left'), spoolR = $('spool-right');

// ── render ────────────────────────────────────────────────────────────
function render() {
  const empty = entries.length === 0;
  idx = empty ? 0 : Math.min(idx, entries.length - 1);
  const e = empty ? null : entries[idx];

  // cassette label
  wrap.classList.toggle('side-empty', empty);
  $('label-track').textContent = empty ? '--' : String(idx + 1).padStart(2, '0');

  const notationEl = $('label-notation');
  const shape = e ? (e.shape || '') : '';
  notationEl.textContent = shape;
  const fs = shape.length > 22 ? Math.max(5, 7.5 - (shape.length - 22) * 0.15) : 7.5;
  notationEl.setAttribute('font-size', fs);
  $('label-song').textContent = empty ? '— pass —' : (e.song + ' — ' + e.artist).slice(0, 36);

  // entry card
  $('entry').classList.toggle('empty', empty);

  if (empty) {
    ['shape', 'meta', 'notes-btn', 'notes-body', 'instance', 'listen', 'audio'].forEach(id => {
      const el = $(id); if (el) el.hidden = true;
    });
    document.querySelector('.track').style.display = 'none';
    $('pass').hidden = false;
  } else {
    $('pass').hidden = true;
    document.querySelector('.track').style.display = '';

    $('shape').hidden = false;
    $('shape').textContent = e.shape || '';
    $('track-song').textContent = e.song || '';
    $('track-artist').textContent = e.artist || '';

    // meta
    const meta = $('meta');
    meta.hidden = false;
    meta.innerHTML = '';
    const parts = [e.temperature, e.weight, e.direction, e.profile].filter(Boolean);
    parts.forEach((p, i) => {
      if (i > 0) {
        const dot = document.createElement('span');
        dot.className = 'dot'; dot.textContent = '·';
        meta.appendChild(dot);
      }
      const span = document.createElement('span');
      if (i === parts.length - 1 && e.profile) span.className = 'meta-profile';
      span.textContent = p;
      meta.appendChild(span);
    });

    // notes (unexpected)
    if (e.unexpected) {
      const btn = $('notes-btn');
      btn.hidden = false;
      btn.textContent = notesOpen ? '▴ notes' : '▾ notes';
      const body = $('notes-body');
      body.hidden = !notesOpen;
      body.textContent = e.unexpected;
    } else {
      $('notes-btn').hidden = true;
      $('notes-body').hidden = true;
    }

    // instance
    const instEl = $('instance');
    instEl.hidden = !e.instance;
    if (e.instance) instEl.textContent = e.instance;

    // listen / embed
    if (e.audio) {
      const listenEl = $('listen');
      listenEl.hidden = false;
      listenEl.textContent = audioOpen ? '◂ hide' : '▸ listen';
      const audioEl = $('audio');
      audioEl.hidden = !audioOpen;
      const iframe = $('audio-iframe');
      if (audioOpen && iframe.src !== e.audio) iframe.src = e.audio;
      if (!audioOpen) iframe.src = '';
    } else {
      $('listen').hidden = true;
      $('audio').hidden = true;
    }

    // spools spin when embed is open
    spoolL.classList.toggle('spinning', audioOpen);
    spoolR.classList.toggle('spinning', audioOpen);
  }

  // controls
  $('btn-prev').disabled = empty || idx === 0;
  $('btn-next').disabled = empty || idx >= entries.length - 1;

  // tracklist
  $('list-count').textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;
  const rowsEl = $('list-rows');
  rowsEl.innerHTML = '';
  entries.forEach((it, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'row' + (i === idx ? ' is-active' : '');
    btn.innerHTML = `
      <span class="row-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="row-shape">${it.shape || ''}</span>
      <span class="row-song">
        <span class="row-title">${it.song || ''}</span>
        <span class="row-artist">${it.artist || ''}</span>
      </span>`;
    btn.addEventListener('click', () => {
      idx = i; audioOpen = false; notesOpen = false; render();
    });
    li.appendChild(btn);
    rowsEl.appendChild(li);
  });
}

// ── events ────────────────────────────────────────────────────────────
$('btn-prev').addEventListener('click', () => {
  if (idx > 0) { idx--; audioOpen = false; notesOpen = false; render(); }
});
$('btn-next').addEventListener('click', () => {
  if (idx < entries.length - 1) { idx++; audioOpen = false; notesOpen = false; render(); }
});
$('listen').addEventListener('click', () => {
  audioOpen = !audioOpen; render();
});
$('notes-btn').addEventListener('click', () => {
  notesOpen = !notesOpen; render();
});

// ── init ──────────────────────────────────────────────────────────────
loadEntries().then(render).catch(() => render());
</script>
</body>
